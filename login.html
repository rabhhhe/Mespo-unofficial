<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enter Password - MES Ponnani College</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="images/favicon.png">
  <style>
    :root {
      --green:        #1b3a2d;
      --green-dark:   #142b21;
      --brick:        #8b3326;
      --cream:        #f4f0e6;
      --white:        #ffffff;
      --text-dark:    #1a1a18;
      --text-muted:   #6e6e62;
      --border:       rgba(26,58,45,.12);
      --font-serif:   'Cormorant Garamond', Georgia, serif;
      --font-sans:    'Inter', system-ui, sans-serif;
      --ease:         .35s cubic-bezier(.4,0,.2,1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--cream);
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .login-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 30px 60px -15px rgba(27,58,45,0.15);
      text-align: center;
    }
    .login-logo {
      height: 64px;
      width: auto;
      margin: 0 auto 24px auto;
      object-fit: contain;
      mix-blend-mode: multiply;
      display: block;
    }
    .login-title {
      font-family: var(--font-serif);
      font-size: 2rem;
      font-weight: 700;
      color: var(--green);
      margin-bottom: 8px;
    }
    .login-subtitle {
      font-size: .84rem;
      color: var(--text-muted);
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .form-group {
      position: relative;
      margin-bottom: 20px;
      text-align: left;
    }
    .form-label {
      display: block;
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .input-wrapper {
      position: relative;
    }
    .form-input {
      width: 100%;
      padding: 14px 44px 14px 16px;
      font-family: var(--font-sans);
      font-size: .9rem;
      color: var(--text-dark);
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 4px;
      outline: none;
      transition: all var(--ease);
    }
    .form-input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(27,58,45,0.06);
    }
    .toggle-password {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color var(--ease);
    }
    .toggle-password:hover {
      color: var(--green);
    }
    .error-msg {
      color: var(--brick);
      font-size: .78rem;
      margin-top: 8px;
      min-height: 18px;
      opacity: 0;
      transition: opacity var(--ease);
    }
    .error-msg.visible {
      opacity: 1;
    }
    .submit-btn {
      width: 100%;
      background: var(--green);
      color: var(--white);
      border: none;
      border-radius: 4px;
      padding: 16px;
      font-family: var(--font-sans);
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all var(--ease);
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .submit-btn:hover {
      background: var(--green-dark);
      box-shadow: 0 4px 12px rgba(27,58,45,0.15);
    }
    .caution-box {
      margin-top: 32px;
      padding: 16px 20px;
      background: rgba(139, 51, 38, 0.05);
      border-left: 3px solid var(--brick);
      border-radius: 4px;
      text-align: left;
    }
    .caution-title {
      font-size: .78rem;
      font-weight: 700;
      color: var(--brick);
      display: flex;
      align-items: center;
      gap: 6px;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 6px;
    }
    .caution-text {
      font-size: .75rem;
      color: var(--text-muted);
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <img src="images/mes_logo.png" alt="MES Logo" class="login-logo">
    <h1 class="login-title">MES PONNANI COLLEGE</h1>
    <p class="login-subtitle">Enter the preview password to access this portfolio project.</p>
    
    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrapper">
          <input type="password" id="password" class="form-input" placeholder="••••••••" required autofocus>
          <button type="button" id="toggle-pwd-btn" class="toggle-password" aria-label="Toggle password visibility">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="eye-open">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div id="error-feedback" class="error-msg">Incorrect password. Please try again.</div>
      </div>
      <button type="submit" class="submit-btn">
        <span>Enter Website</span>
      </button>
    </form>
    
    <div class="caution-box">
      <div class="caution-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;">
          <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        Preview Website
      </div>
      <p class="caution-text">This website is a personal UI/UX practice project created for learning and portfolio purposes. Access is limited while the project is under development.</p>
    </div>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const passwordInput = document.getElementById('password');
    const togglePwdBtn = document.getElementById('toggle-pwd-btn');
    const errorFeedback = document.getElementById('error-feedback');

    // Password visibility toggle
    togglePwdBtn.addEventListener('click', () => {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      
      // Toggle icon visual state
      togglePwdBtn.innerHTML = type === 'password' 
        ? `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`
        : `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
    });

    // Submit verification
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const pwd = passwordInput.value;
      
      // Verify password
      if (pwd.trim() === 'ponnani1968') {
        sessionStorage.setItem('site_authenticated', 'true');
        window.location.href = 'index.html';
      } else {
        errorFeedback.classList.add('visible');
        passwordInput.focus();
        passwordInput.select();
      }
    });

    // Clear error on input
    passwordInput.addEventListener('input', () => {
      errorFeedback.classList.remove('visible');
    });
  </script>
</body>
</html>
